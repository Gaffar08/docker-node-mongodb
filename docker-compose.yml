version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - frontend-net
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - mongo

  mongo:
    image: mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - backend-net

volumes:
  mongo_data:

networks:
  frontend-net:
  backend-net: